<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Mods Store</title>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 CONFIG FIREBASE (trocar pela sua) */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "ID",
  appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 CARREGAR MODS DO FIRESTORE */
async function carregarMods() {
    const grid = document.getElementById("modsGrid");
    grid.innerHTML = "";

    const snapshot = await getDocs(collection(db, "mods"));

    snapshot.forEach((doc) => {
        const data = doc.data();

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <h3>${data.nome}</h3>
            <p>${data.descricao}</p>
            <a href="${data.link}" target="_blank">⬇ Baixar</a>
        `;

        grid.appendChild(card);
    });
}

window.onload = carregarMods;
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* FUNDO */
body{
    background-image:url('Correto.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* overlay escuro */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    width:95%;
    max-width:900px;
    padding:20px;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.tabs button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1c2333;
    color:white;
    transition:0.3s;
    box-shadow:0 0 5px rgba(0,255,255,0.1);
}

.tabs button:hover{
    background:#00ffff;
    color:black;
    box-shadow:0 0 15px #00ffff, 0 0 25px #00ffff;
    transform:scale(1.05);
}

.tabs button.ativo{
    background:#00ffff;
    color:black;
    box-shadow:
        0 0 10px #00ffff,
        0 0 25px #00ffff,
        0 0 50px #00ffff,
        0 0 80px #00ffff;
}

/* PAGINAS */
.pagina{
    display:none;
}

.pagina.ativa{
    display:block;
}

/* HERO */
.hero{
    text-align:center;
    margin-bottom:20px;
}

.hero h1{
    color:#00ffff;
    font-size:32px;
}

/* GRID MODS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:15px;
}

/* CARD MOD */
.card{
    background:#151c2b;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,255,255,0.15);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(0,255,255,0.35);
}

.card h3{
    color:#00ffff;
    margin-bottom:10px;
}

.card p{
    font-size:13px;
    color:#ccc;
    margin-bottom:10px;
}

/* BOTÃO DOWNLOAD NEON */
.card a{
    display:inline-block;
    padding:10px 14px;
    background:linear-gradient(90deg,#00ffff,#0077ff);
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 0 10px #00ffff;
    transition:0.3s;
}

.card a:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #00ffff;
}

/* FEEDBACK */
.feedback-box{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:500px;
    margin:auto;
}

.feedback-box textarea{
    height:120px;
    resize:none;
    border:none;
    border-radius:10px;
    padding:10px;
    outline:none;
}

.feedback-box button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00ffff;
    font-weight:bold;
    box-shadow:0 0 10px #00ffff;
}
</style>

</head>

<body>

<div class="container">

    <!-- TABS -->
    <div class="tabs">
        <button onclick="mostrar(event,'inicio')">🏠 Início</button>
        <button onclick="mostrar(event,'mods')">🛒 Mods</button>
        <button onclick="mostrar(event,'discord')">🎮 Discord</button>
        <button onclick="mostrar(event,'feedback')">💬 Feedback</button>
    </div>

    <!-- INICIO -->
    <section id="inicio" class="pagina ativa">
        <div class="hero">
            <h1>⚡ Nebula Mods Store ⚡</h1>
            <p>Mods atualizados automaticamente pelo Firebase</p>
        </div>
    </section>

    <!-- MODS -->
    <section id="mods" class="pagina">
        <div class="grid" id="modsGrid">
            <!-- MODS DO FIREBASE APARECEM AQUI -->
        </div>
    </section>

    <!-- DISCORD -->
    <section id="discord" class="pagina">
        <div class="hero">
            <h1>Discord</h1>
            <a href="https://discord.gg/S9ggHtngD6" style="color:#00ffff;">Entrar</a>
        </div>
    </section>

    <!-- FEEDBACK -->
    <section id="feedback" class="pagina">
        <div class="hero">
            <h1>Feedback 💬</h1>
        </div>

        <div class="feedback-box">
            <textarea id="msg" placeholder="Escreva sua opinião..."></textarea>
            <button onclick="enviarFeedback()">Enviar</button>
        </div>
    </section>

</div>

<script>
function mostrar(event, id){
    document.querySelectorAll('.pagina').forEach(p=>p.classList.remove('ativa'));
    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('ativo'));

    document.getElementById(id).classList.add('ativa');
    event.currentTarget.classList.add('ativo');
}

/* FEEDBACK DISCORD */
function enviarFeedback(){

    const msg = document.getElementById("msg").value.trim();

    if(!msg){
        alert("Escreva algo antes de enviar!");
        return;
    }

    fetch("SEU_WEBHOOK_DISCORD_AQUI", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            content:"💬 Feedback Nebula:\n" + msg
        })
    });

    alert("Enviado!");
    document.getElementById("msg").value="";
}
</script>

</body>
</html>
