<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Nebuloso</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffff">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:800px;
    box-shadow:0 0 30px rgba(0,255,255,0.3);
}

h1{
    font-size:3rem;
    color:#00ffff;
}

.tabs button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:rgba(255,255,255,0.1);
    color:white;
}

.tabs button.ativo{
    background:#00ffff;
    color:#000;
}

.pagina{display:none;margin-top:20px;}

.btn{
    display:inline-block;
    margin:10px;
    padding:12px 20px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.download{background:#00ffff;color:#000;}
.discord{background:#5865F2;color:white;}
.starlight{background:#FFD700;color:#000;}

</style>
</head>

<body>

<div class="container">

<h1>⚡ Portal Nebuloso ⚡</h1>

<div class="tabs">
<button onclick="mostrar(event,'inicio')">Início</button>
<button onclick="mostrar(event,'downloads')">Downloads</button>
<button onclick="mostrar(event,'discord')">Discord</button>
</div>

<section id="inicio" class="pagina">
<p>Bem-vindo ao Portal Nebuloso 🌌</p>
</section>

<section id="downloads" class="pagina">
<a class="btn download" href="https://www.mediafire.com/file/a5drvko5ofwkgbf/among-us-mod-Nebuloso.com.apk/file">Download</a>
<a class="btn starlight" href="https://play.google.com/store/search?q=starlight+among+us&c=apps">Starlight</a>
</section>

<section id="discord" class="pagina">
<a class="btn discord" href="https://discord.gg/S9ggHtngD6">Entrar no Discord</a>
</section>

</div>

<script>
function mostrar(event,id){
    document.querySelectorAll('.pagina').forEach(p=>p.style.display='none');
    document.getElementById(id).style.display='block';

    document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('ativo'));
    event.target.classList.add('ativo');
}

document.addEventListener('DOMContentLoaded',()=>{
    document.querySelector('.tabs button').click();
});

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
