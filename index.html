<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00ffff">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Nebuloso</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

.pagina{
    display:none;
}

.pagina.ativa{
    display:block;
}

body{
    background-image:url('Correto.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:800px;
    box-shadow:0 0 30px rgba(0,255,255,0.3);
    animation:fadeIn 1s ease;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
    color:#00ffff;
}

p{
    margin-bottom:30px;
    color:#d1d5db;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:15px 30px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.download{
    background:#00ffff;
    color:#000;
}

.discord{
    background:#5865F2;
    color:white;
}

.starlight{
    background:#FFD700;
    color:#000;
    box-shadow:0 0 15px #FFD700;
}

.btn:hover{
    transform:scale(1.05);
}

/* Abas */
.tabs{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:25px;
}

.tabs button{
    color:white;
    background:rgba(255,255,255,0.1);
    padding:12px 18px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:0.3s;
    font-size:15px;
}

.tabs button:hover{
    background:#00ffff;
    color:black;
}

.tabs button.ativo{
    background:#00ffff;
    color:#000;
    box-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff,
        0 0 80px #00ffff;
    transform: scale(1.05);
}

section{
    margin-top:20px;
}

@media(max-width:600px){
    .container{
        padding:25px;
    }

    h1{
        font-size:2rem;
    }

    .btn{
        display:block;
        width:100%;
        margin:10px 0;
    }

    .tabs{
        flex-direction:column;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>

<body>

<div class="container">

  <div class="tabs">
    <button onclick="mostrar(event,'inicio')">🏠 Início</button>
    <button onclick="mostrar(event,'downloads')">📥 Downloads</button>
    <button onclick="mostrar(event,'discord')">🎮 Discord</button>
    <button onclick="mostrar(event,'sobre')">⚙️ Sobre</button>
</div>

  <section id="inicio" class="pagina">
        <h1>⚡ Portal Nebuloso ⚡</h1>
        <p>🌌 Bem-vindo ao Portal Nebuloso. Downloads, projetos e novidades reunidos em um único universo.</p>
    </section>

    <section id="downloads" class="pagina">
        <a href="https://www.mediafire.com/file/a5drvko5ofwkgbf/among-us-mod-Nebuloso.com.apk/file" class="btn download">📥 Download</a>
        <a href="https://play.google.com/store/search?q=starlight+among+us&c=apps" class="btn starlight">⭐ Starlight</a>
    </section>

    <section id="discord" class="pagina">
        <a href="https://discord.gg/S9ggHtngD6" class="btn discord">🎮 Discord</a>
    </section>

    <section id="sobre" class="pagina">
        <p>🚀 Portal Nebuloso v1.0<br>Desenvolvido por Nebuloso.</p>
    </section>

</div>

<script>
function mostrar(event, id){

    document.querySelectorAll('.pagina').forEach(p => {
        p.classList.remove('ativa');
    });

    document.getElementById(id).classList.add('ativa');

    document.querySelectorAll('.tabs button').forEach(btn => {
        btn.classList.remove('ativo');
    });

    event.currentTarget.classList.add('ativo');
}

// inicia na aba início
document.addEventListener("DOMContentLoaded", function(){
    document.getElementById("inicio").classList.add("ativa");
    document.querySelector(".tabs button").classList.add("ativo");
});
</script>

</body>
</html>
