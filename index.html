<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Mods Store</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJECT_ID",
  storageBucket: "SEU_BUCKET",
  messagingSenderId: "ID",
  appId: "APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 🔥 CARREGAR MODS */
async function carregarMods() {
    const grid = document.getElementById("modsGrid");

    console.log("🔥 Iniciando carregamento...");

    grid.innerHTML = "<p>Carregando mods...</p>";

    try {
        const snapshot = await getDocs(collection(db, "mods"));

        console.log("📦 Mods encontrados:", snapshot.size);

        grid.innerHTML = "";

        if (snapshot.empty) {
            grid.innerHTML = "<p>❌ Nenhum mod encontrado no Firebase</p>";
            return;
        }

        snapshot.forEach((doc) => {
            const data = doc.data();

            console.log("📄 Mod:", data);

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <h3>${data.nome || "Sem nome"}</h3>
                <p>${data.descricao || "Sem descrição"}</p>
                <a href="${data.link || "#"}" target="_blank">⬇ Baixar</a>
            `;

            grid.appendChild(card);
        });

    } catch (err) {
        console.log("❌ ERRO FIREBASE:", err);
        grid.innerHTML = "<p>Erro ao carregar mods ❌</p>";
    }
}

window.addEventListener("DOMContentLoaded", carregarMods);
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background-image:url('Correto.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    width:95%;
    max-width:900px;
    padding:20px;
}

.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.tabs button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1c2333;
    color:white;
    transition:0.3s;
}

.tabs button:hover{
    background:#00ffff;
    color:black;
    box-shadow:0 0 15px #00ffff;
}

.tabs button.ativo{
    background:#00ffff;
    color:black;
    box-shadow:0 0 25px #00ffff;
}

.pagina{ display:none; }
.pagina.ativa{ display:block; }

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:15px;
}

.card{
    background:#151c2b;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,255,255,0.15);
}

.card h3{ color:#00ffff; }
.card p{ color:#ccc; font-size:13px; }

.card a{
    display:inline-block;
    margin-top:10px;
    padding:10px;
    background:#00ffff;
    color:black;
    border-radius:8px;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<div class="tabs">
    <button onclick="mostrar(event,'inicio')">🏠 Início</button>
    <button onclick="mostrar(event,'mods')">🛒 Mods</button>
</div>

<section id="inicio" class="pagina ativa">
    <h1>⚡ Nebula Mods Store ⚡</h1>
</section>

<section id="mods" class="pagina">
    <div class="grid" id="modsGrid"></div>
</section>

</div>

<script>
function mostrar(event, id){
    document.querySelectorAll('.pagina').forEach(p=>p.classList.remove('ativa'));
    document.getElementById(id).classList.add('ativa');
}
</script>

</body>
</html>
