<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nebula Mods Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background-image:url('Correto.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* overlay pra destacar UI */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:0;
}

.container{
    position:relative;
    z-index:1;
    width:95%;
    max-width:900px;
    padding:20px;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.tabs button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1c2333;
    color:white;
    transition:0.3s;
    box-shadow:0 0 5px rgba(0,255,255,0.1);
}

/* hover neon */
.tabs button:hover{
    background:#00ffff;
    color:black;
    box-shadow:0 0 10px #00ffff, 0 0 20px #00ffff;
    transform:scale(1.05);
}

/* ativo neon forte */
.tabs button.ativo{
    background:#00ffff;
    color:black;
    box-shadow:
        0 0 10px #00ffff,
        0 0 25px #00ffff,
        0 0 50px #00ffff,
        0 0 80px #00ffff;
    transform:scale(1.08);
}

/* PAGINAS */
.pagina{
    display:none;
}

.pagina.ativa{
    display:block;
}

/* CARDS */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:15px;
}

.card{
    background:#151c2b;
    padding:15px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,255,255,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(0,255,255,0.35);
}

.card h3{
    margin:10px 0;
    color:#00ffff;
}

.card p{
    font-size:13px;
    color:#ccc;
    margin-bottom:10px;
}

.card a{
    display:inline-block;
    padding:8px 12px;
    background:#00ffff;
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

/* HERO */
.hero{
    text-align:center;
    margin-bottom:20px;
}

.hero h1{
    color:#00ffff;
}
</style>

</head>

<body>

<div class="container">

    <div class="tabs">
        <button onclick="mostrar(event,'inicio')">🏠 Início</button>
        <button onclick="mostrar(event,'mods')">🛒 Mods</button>
        <button onclick="mostrar(event,'discord')">🎮 Discord</button>
    </div>

    <!-- INICIO -->
    <section id="inicio" class="pagina ativa">
        <div class="hero">
            <h1>Nebula Mods Store</h1>
            <p>Os melhores mods reunidos em um só lugar</p>
        </div>
    </section>

    <!-- MODS -->
    <section id="mods" class="pagina">
        <div class="grid">

            <div class="card">
                <h3>Among Us Mod</h3>
                <p>Unlock skins + extras</p>
                <a href="https://www.mediafire.com/file/a5drvko5ofwkgbf/among-us-mod-Nebuloso.com.apk/file">Baixar</a>
            </div>

            <div class="card">
                <h3>Starlight Pack</h3>
                <p>Skins exclusivas e efeitos</p>
                <a href="https://play.google.com/store/search?q=starlight+among+us&c=apps">Baixar</a>
            </div>

            <div class="card">
                <h3>FPS Boost</h3>
                <p>Melhora desempenho do jogo</p>
                <a href="#">Baixar</a>
            </div>

        </div>
    </section>

    <!-- DISCORD -->
    <section id="discord" class="pagina">
        <div class="hero">
            <h1>Discord da Comunidade</h1>
            <a href="https://discord.gg/S9ggHtngD6" style="color:#00ffff;">Entrar</a>
        </div>
    </section>

</div>

<script>
function mostrar(event, id){
    document.querySelectorAll('.pagina').forEach(p=>{
        p.classList.remove('ativa');
    });

    document.querySelectorAll('.tabs button').forEach(b=>{
        b.classList.remove('ativo');
    });

    document.getElementById(id).classList.add('ativa');
    event.currentTarget.classList.add('ativo');
}
</script>

</body>
</html>
