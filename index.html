<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal Nebula</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background-image:url('POrtal.png');
   background-size: cover;
    background-position:center;
    background-repeat:no-repeat;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.container{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    padding:40px;
    border-radius:20px;
    width:90%;
    max-width:800px;
    box-shadow:0 0 30px rgba(0,255,255,0.3);
    animation:fadeIn 1s ease;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
    color:#00ffff;
}

p{
    margin-bottom:30px;
    color:#d1d5db;
}

.btn{
    display:inline-block;
    margin:10px;
    padding:15px 30px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}

.download{
    background:#00ffff;
    color:#000;
}

.discord{
    background:#5865F2;
    color:white;
}

.starlight{
    background:#FFD700;
    color:#000;
    box-shadow:0 0 15px #FFD700;
}

.btn:hover{
    transform:scale(1.05);
}

/* Abas */
.tabs{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:25px;
}

.tabs a{
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,0.1);
    padding:12px 18px;
    border-radius:12px;
    transition:0.3s;
}

.tabs a:hover{
    background:#00ffff;
    color:black;
}
    .tabs button{
    color:white;
    background:rgba(255,255,255,0.1);
    padding:12px 18px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    transition:0.3s;
    font-size:15px;
}

.tabs button:hover{
    background:#00ffff;
    color:black;
}

.tabs button.ativo{
    background:#00ffff;
    color:#000;
    box-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
}

section{
    margin-top:20px;
}

@media(max-width:600px){

    .container{
        padding:25px;
    }

    h1{
        font-size:2rem;
    }

    .btn{
        display:block;
        width:100%;
        margin:10px 0;
    }

    .tabs{
        flex-direction:column;
    }

    .tabs a{
        width:100%;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

   <div class="tabs">
    <button onclick="mostrar('inicio')">🏠 Início</button>
    <button onclick="mostrar('downloads')">📥 Downloads</button>
    <button onclick="mostrar('discord')">🎮 Discord</button>
    <button onclick="mostrar('sobre')">⚙️ Sobre</button>
</div>

   <section id="inicio" class="pagina">
        <h1>⚡ Portal Nebuloso ⚡</h1>

        <p>
        🌌 Bem-vindo ao Portal Nebuloso.
        Downloads, projetos e novidades reunidos em um único universo.
        </p>
    </section>

    <section id="downloads" class="pagina" style="display:none;">
        <a href="https://www.mediafire.com/file/a5drvko5ofwkgbf/among-us-mod-Nebuloso.com.apk/file" class="btn download">
        📥 Download
        </a>

        <a href="https://play.google.com/store/search?q=starlight+among+us&c=apps" class="btn starlight">
        ✩ Starlight
        </a>
    </section>

   <section id="discord" class="pagina" style="display:none;">
        <a href="https://discord.gg/S9ggHtngD6" class="btn discord">
        🎮 Discord
        </a>
    </section>

    <section id="sobre" class="pagina" style="display:none;">
        <p>
        🚀 Portal Nebuloso v1.0<br>
        Desenvolvido por Nebuloso.
        </p>
    </section>

</div>

<script>
function mostrar(id){

    document.querySelectorAll('.pagina').forEach(function(pagina){
        pagina.style.display = 'none';
    });

    document.getElementById(id).style.display = 'block';

    document.querySelectorAll('.tabs button').forEach(function(btn){
        btn.classList.remove('ativo');
    });

    event.target.classList.add('ativo');
}

document.addEventListener('DOMContentLoaded', function(){
    document.querySelector('.tabs button').classList.add('ativo');
});
</script>

</body>
</html>
