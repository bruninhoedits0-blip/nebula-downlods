<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Portal Nebuloso ⚡</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
    background-image:url('Correto.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:0;
}
.container{
    position:relative;
    z-index:1;
    width:95%;
    max-width:900px;
    padding:20px;
}
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}
.tabs button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1c2333;
    color:white;
    transition:.3s;
}
.tabs button:hover{
    background:#00ffff;
    color:black;
    transform:scale(1.05);
}
.tabs button.ativo{
    background:#00ffff;
    color:black;
    box-shadow:0 0 25px #00ffff;
}
.pagina{display:none;}
.pagina.ativa{display:block;}

.hero{text-align:center;margin-bottom:20px;}
.hero h1{color:#00ffff;}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:15px;
}

.card{
    background:#151c2b;
    padding:15px;
    border-radius:15px;
    text-align:center;
    transition:.3s;
    box-shadow:0 0 15px rgba(0,255,255,.1);
}
.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 25px rgba(0,255,255,.35);
}
.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:10px;
}
.card h3{color:#00ffff;margin:10px 0;}
.card p{font-size:13px;color:#ccc;margin-bottom:10px;}
.card a{
    display:inline-block;
    padding:10px 14px;
    background:linear-gradient(90deg,#00ffff,#0088ff);
    color:black;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.feedback-box{
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:500px;
    margin:auto;
}
.feedback-box textarea{
    height:120px;
    resize:none;
    border:none;
    border-radius:10px;
    padding:10px;
}
.feedback-box button{
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00ffff;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<div class="tabs">
<button onclick="mostrar(event,'inicio')">🏠 Início</button>
<button onclick="mostrar(event,'mods')">🛒 Mods</button>
<button onclick="mostrar(event,'discord')">🎮 Discord</button>
<button onclick="mostrar(event,'feedback')">💬 Feedback</button>
</div>

<section id="inicio" class="pagina ativa">
<div class="hero">
<h1>⚡Portal Nebuloso⚡</h1>
<p>Os melhores mods reunidos em um só lugar</p>
</div>
</section>

<section id="mods" class="pagina">
<div class="hero">
<h1>🛒 Mods Disponíveis</h1>
<p id="contadorMods">Mods disponíveis: 0</p>
</div>

<div class="grid">

<div class="card">
<img src="amongus.jpg" alt="Among Us Mod">
<h3>Among Us Mod</h3>
<p>Unlock skins + extras</p>
<a href="https://www.mediafire.com/file/a5drvko5ofwkgbf/among-us-mod-Nebuloso.com.apk/file">⬇ Baixar</a>
</div>

<div class="card">
<img src="starlight.png" alt="Starlight Pack">
<h3>Starlight Pack</h3>
<p>Skins exclusivas</p>
<a href="https://play.google.com/store/search?q=starlight+among+us&c=apps">⬇ Baixar</a>
</div>

</div>
</section>

<section id="discord" class="pagina">
<div class="hero">
<h1>Discord</h1>
<a href="https://discord.gg/S9ggHtngD6" style="color:#00ffff;">Entrar</a>
</div>
</section>

<section id="feedback" class="pagina">
<div class="hero">
<h1>Deixe seu feedback 💬</h1>
</div>

<div class="feedback-box">
<textarea id="msg" placeholder="Escreva sua opinião..."></textarea>
<button onclick="enviarFeedback()">Enviar</button>
</div>
</section>

</div>

<script>
function mostrar(event,id){
document.querySelectorAll('.pagina').forEach(p=>p.classList.remove('ativa'));
document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('ativo'));
document.getElementById(id).classList.add('ativa');
event.currentTarget.classList.add('ativo');
}

window.onload=function(){
const total=document.querySelectorAll('#mods .card').length;
document.getElementById('contadorMods').innerText='Mods disponíveis: '+total;
}

function enviarFeedback(){
const msg=document.getElementById("msg").value.trim();
if(!msg){alert("Escreva algo antes de enviar!");return;}

fetch("https://discord.com/api/webhooks/1514650773303066704/UytEJ8u-3P1YtaZiJf0UTh5nN4nuSMWOeA8Kui5jHrhzNpF0foNXGHpptFWkLnaSt9l6",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
content:`💬 **Feedback Nebula Mods:**\n${msg}`
})
})
.then(res=>{
if(res.ok){
alert("Feedback enviado!");
document.getElementById("msg").value="";
}else{
alert("Erro ao enviar feedback.");
}
})
.catch(()=>alert("Erro de conexão com Discord."));
}
</script>

</body>
</html>
